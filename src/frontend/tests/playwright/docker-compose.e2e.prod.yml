services:
  # Production-like mode: run Core from the production container definition
  # and use Postgres + RabbitMQ sidecars.
  database:
    image: "postgres:17-alpine"
    shm_size: 512mb
    environment:
      POSTGRES_DB: taranis
      POSTGRES_USER: taranis
      POSTGRES_PASSWORD: taranis
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=1000"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taranis -d taranis"]
      interval: 10s
      start_period: 10s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: "${DOCKER_IMAGE_NAMESPACE:-ghcr.io/taranis-ai}/rabbitmq:latest"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  core:
    image: taranis-core-e2e:local
    build:
      context: ../../../..
      dockerfile: docker/Containerfile.core
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: database
      DB_DATABASE: taranis
      DB_USER: taranis
      DB_PASSWORD: taranis
      QUEUE_BROKER_HOST: rabbitmq
      QUEUE_BROKER_USER: taranis
      QUEUE_BROKER_PASSWORD: supersecret
      TARANIS_AUTHENTICATOR: database
      PRE_SEED_PASSWORD_ADMIN: admin
      PRE_SEED_PASSWORD_USER: test
      JWT_SECRET_KEY: test_key_for_tests_only_do_not_use
      API_KEY: test_key
      DEBUG: "false"
      DISABLE_SSE: "true"
      DISABLE_SCHEDULER: "true"
      APPLICATION_ROOT: /
      GRANIAN_HOST: 0.0.0.0
      GRANIAN_PORT: "8080"
    ports:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/api/isalive"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
