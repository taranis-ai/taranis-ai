<div class="relative w-72 lg:w-144"
     role="search"
     x-data='omniSearch({{ url_for("base.omnisearch") | tojson }})'
     @keydown.escape.window="open = false"
     @keydown.window="focusShortcut($event)"
     @click.outside="open = false">
  <label class="input input-bordered input-sm flex items-center gap-2">
    {{ heroicon_outline('magnifying-glass', class='h-4 w-4 text-base-content/70') }}
    <input type="search"
           id="omnisearch"
           placeholder="Search all..."
           class="min-w-0 grow"
           autocomplete="off"
           aria-label="Omnisearch"
           data-testid="omnisearch-input"
           x-ref="omniInput"
           @focus="open = true"
           @click="open = true"
           @input="open = true"
           @keydown.enter.prevent.stop="submitOmniSearch()"
           hx-get="{{ url_for('base.omnisearch_suggestions') }}"
           hx-vals="js:{q: this.value}"
           hx-target="#omnisearch-suggestions"
           hx-swap="innerHTML"
           hx-trigger="focus, click, input changed delay:300ms, search"
           hx-push-url="false">
    <span class="text-xs">
      <kbd class="kbd kbd-xs text-base-content">/</kbd>
    </span>
  </label>
  <div id="omnisearch-suggestions" class="absolute left-0 right-0 top-full z-50 mt-2" x-show="open" x-cloak></div>
</div>
