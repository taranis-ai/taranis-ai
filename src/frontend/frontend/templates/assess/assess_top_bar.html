
<div class="sticky z-10 mb-4"
     style="top: calc(var(--app-header-height) + var(--viewport-warning-height))"
     @keydown.shift.window="showHints = true"
     @keyup.shift.window="showHints = false">
  <div class="flex p-2 flex-row justify-between min-h-[3rem] bg-base-100 border border-base-300 shadow-lg rounded-box">
    <div class="flex flex-col gap-2 flex-row items-center text-sm">
      <div class="flex items-center gap-3" x-show="selectedItems.length" x-transition.opacity x-cloak data-testid="assess_story_selection_count">
        <span class="badge badge-primary badge-lg" x-text="selectedItems.length"></span>
        <span class="font-medium">stories selected</span>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2" data-testid="assess_story_count">
          <span class="badge badge-ghost badge-lg"><span x-text="storyIds.length"></span> / {{ stories.total_count }}</span>
          <span class="font-medium text-base-content">Stories</span>
        </div>
      </div>
      <span class="inline-block min-w-[11rem] text-base-content/60"
            x-show="selectedItems.length"
            :class="{ 'invisible': selectedItems.length !== 1 }"
            :aria-hidden="(selectedItems.length !== 1).toString()">Select one more to cluster</span>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <div class="flex flex-wrap items-center gap-2" x-show="selectedItems.length" x-transition.opacity hx-target="#assess" hx-swap="outerHTML">
        <button type="button"
                class="btn btn-outline btn-sm"
                x-show="selectedItems.length === 1"
                @click="openStoryEdit()"
                @keyup.shift.e.prevent.window="canUseAssessShortcut($event) && selectedItems.length === 1 && openStoryEdit()">
          {{ heroicon_mini("pencil") }}
          <span class="text-sm">Edit</span>
          <span class="text-xs opacity-80" x-show="showHints">
            <kbd class="kbd kbd-xs text-base-content">Shift+E</kbd>
          </span>
        </button>

        <button type="button"
                x-ref="clusterButton"
                class="btn btn-outline btn-sm"
                x-show="selectedItems.length >= 2"
                hx-trigger="click"
                @keyup.shift.g.prevent.window="canUseAssessShortcut($event) && selectedItems.length >= 2 && $refs.clusterButton.click()"
                hx-get="{{ url_for('assess.cluster_story') }}"
                hx-target="body"
                hx-swap="beforeend"
                :hx-vals='action_vals()'>
          {{ heroicon_mini("rectangle-group") }}
          <span class="text-sm">Cluster</span>
          <span class="text-xs opacity-80" x-show="showHints">
            <kbd class="kbd kbd-xs">Shift+G</kbd>
          </span>
        </button>

        <button type="button"
                class="btn btn-outline btn-sm tooltip"
                hx-trigger="click, keyup[shiftKey && key == 'R' && canUseAssessShortcut(event)] from:body"
                hx-get="{{ url_for('assess.report_story') }}"
                hx-target="body"
                hx-swap="beforeend"
                :data-tip="selectedItems.length > 1 ? 'Add selected stories to report' : 'Add selected story to report'"
                :hx-vals='action_vals()'>
          {{ heroicon_mini("document-chart-bar") }}
          <span class="text-sm">Add to Report</span>
          <span class="text-xs opacity-80" x-show="showHints">
            <kbd class="kbd kbd-xs">Shift+R</kbd>
          </span>
        </button>

        <button type="button"
                class="btn btn-outline btn-sm tooltip"
                hx-trigger="click, keyup[shiftKey && key == 'B' && canUseAssessShortcut(event)] from:body"
                hx-get="{{ url_for('assess.bookmark_story') }}"
                hx-target="body"
                hx-swap="beforeend"
                :data-tip="selectedItems.length > 1 ? 'Bookmark selected stories' : 'Bookmark selected story'"
                :hx-vals='action_vals()'>
          {{ heroicon_mini("bookmark") }}
          <span class="text-sm">Bookmark</span>
          <span class="text-xs opacity-80" x-show="showHints">
            <kbd class="kbd kbd-xs">Shift+B</kbd>
          </span>
        </button>

        <div class="dropdown dropdown-end">
          <button type="button"
                  class="btn btn-outline btn-sm"
                  role="button"
                  aria-haspopup="true"
                  aria-label="Additional Story actions"
                  tabindex="0"
                  data-testid="assess-tob-bar-actions-menu">
            {{ heroicon_mini("ellipsis-horizontal") }}
            <span>Actions</span>
          </button>
          <div class="dropdown-content mt-2 w-48 rounded-box bg-base-100 p-2 shadow" tabindex="0">
            <div class="join join-vertical w-full">
              <button type="button"
                      class="btn btn-outline btn-sm"
                      hx-trigger="click, keyup[shiftKey && code == 'Space' && canUseAssessShortcut(event)] from:body"
                      hx-post="{{ url_for('assess.bulk_action') }}"
                      hx-on::before-request="window.assessSelectionState = { ...(window.assessSelectionState || {}), pruneToVisibleOnNextInit: true }"
                      :hx-vals='action_vals("read", !selectedItemsAreRead())'>
                {{ heroicon_mini("eye") }}
                <span class="text-sm" x-text="selectedItemsAreRead() ? 'Mark as unread' : 'Mark as read'"></span>
                <span class="text-xs opacity-80" x-show="showHints">
                  <kbd class="kbd kbd-xs">Shift+Space</kbd>
                </span>
              </button>

              <button type="button"
                      class="btn btn-outline btn-sm"
                      hx-trigger="click, keyup[shiftKey && key == 'I' && canUseAssessShortcut(event)] from:body"
                      hx-post="{{ url_for('assess.bulk_action') }}"
                      hx-on::before-request="window.assessSelectionState = { ...(window.assessSelectionState || {}), pruneToVisibleOnNextInit: true }"
                      :hx-vals='action_vals("important", !selectedItemsAreImportant())'>
                {{ heroicon_mini("star") }}
                <span class="text-sm" x-text="selectedItemsAreImportant() ? 'Mark as unimportant' : 'Mark as important'"></span>
                <span class="text-xs" x-show="showHints">
                  <kbd class="kbd kbd-xs">Shift+I</kbd>
                </span>
              </button>
            </div>
          </div>
        </div>

      </div>
      <div class="flex flex-wrap items-center gap-2" x-show="!selectedItems.length" x-cloak>
        {% if story_ids %}
          <button type="button"
                  class="btn btn-outline"
                  @keyup.shift.a.window="canUseAssessShortcut($event) && selectAll()"
                  @click="selectAll() "
                  data-testid="assess-select-all-button">
            {{ heroicon_mini("check-circle") }}
            <span class="text-sm">Select all</span>
            <span class="text-xs opacity-80" x-show="showHints">
              <kbd class="kbd kbd-xs">Shift+A</kbd>
            </span>
          </button>
        {% endif %}
      </div>
    </div>
    <div class="flex flex-wrap gap-2" x-show="selectedItems.length">
      <button type="button" class="btn btn-outline" @click="clearSelection()">
        <span class="text-sm">Clear selection</span>
        <span class="text-xs opacity-80">
          <kbd class="kbd kbd-xs">Esc</kbd>
        </span>
      </button>
    </div>
  </div>
</div>
