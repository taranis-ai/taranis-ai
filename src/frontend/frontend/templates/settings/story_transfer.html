{% set export_url = links.export_stories | admin_action %}

<div class="w-full px-2 mt-4">
  <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
    <div class="card bg-base-100 shadow-xl p-3 h-full">
      <div class="card-body h-full flex flex-col">
        <h2 class="card-title">Export Stories</h2>
        <div class="mt-4 flex flex-1 items-end" hx-boost="false">
          <button class="btn btn-outline btn-info w-full"
                  type="button"
                  data-testid="story-export-button"
                  data-export-open
                  onclick="document.getElementById('export_stories_dialog').showModal()">Export Stories</button>
        </div>
        <dialog id="export_stories_dialog" class="modal" data-export-dialog>
          <div class="modal-box">
            <form method="dialog">
              <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg mt-1 mb-4">Export Stories</h3>
            <form method="get"
                  action="{{ export_url }}"
                  class="space-y-4"
                  x-data="{ maxDateTimeLocal: '' }"
                  x-init="const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); maxDateTimeLocal = now.toISOString().slice(0, 16);">
              <div class="grid grid-cols-2 gap-3">
                <label class="input w-full p-1">
                  <span class="label text-xs font-medium text-base-content/70 pr-1 mr-1">From</span>
                  <input name="timefrom"
                         type="datetime-local"
                         class="input-bordered input-xs -ml-3"
                         x-bind:max="maxDateTimeLocal"
                         data-testid="story-export-time-from">
                </label>

                <label class="input w-full p-1">
                  <span class="label text-xs font-medium text-base-content/70 pr-1 mr-1">To</span>
                  <input name="timeto" type="datetime-local" class="input-bordered input-xs -ml-3" x-bind:max="maxDateTimeLocal" data-testid="story-export-time-to">
                </label>
              </div>
              <div class="grid grid-cols-2 gap-2 join">
                <button class="btn btn-outline btn-info" type="submit" data-testid="story-export-dialog-button">All Stories</button>
                <button class="btn btn-outline btn-info" type="submit" name="metadata" value="true" data-testid="story-export-dialog-with-metadata-button">
                  All Stories With Metadata
                </button>
              </div>
            </form>
          </div>
          <form method="dialog" class="modal-backdrop">
            <button>close</button>
          </form>
        </dialog>
      </div>
    </div>

    <div class="card bg-base-100 shadow-xl p-3 h-full">
      <div class="card-body h-full flex flex-col">
        <h2 class="card-title">Import Stories</h2>
        <form class="mt-4 flex flex-1 flex-col gap-3"
              id="stories-import-form"
              method="post"
              action="{{ url_for('assess.import_stories') }}"
              hx-post="{{ url_for('assess.import_stories') }}"
              hx-encoding="multipart/form-data"
              hx-target="#notification-bar"
              hx-swap="outerHTML"
              enctype="multipart/form-data">
          <label class="form-control w-full">
            <span class="label-text mb-2 font-medium">Import Stories from JSON</span>
            <input type="file"
                   name="file"
                   accept="application/json,.json"
                   class="file-input file-input-bordered w-full"
                   data-testid="settings-story-import-file"
                   required>
          </label>
          <button type="submit" class="btn btn-outline btn-accent mt-auto" data-testid="settings-story-import-submit">Import Stories</button>
        </form>
      </div>
    </div>
  </div>
</div>
