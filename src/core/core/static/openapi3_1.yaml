openapi: 3.1.0
info:
  title: Taranis AI
  contact:
    name: Benjamin Akhras
    url: https://taranis.ai
    email: taranis@list.ait.ac.at
  description: |-
    The Taranis API provides endpoints for the Taranis is an OSINT gathering and analysis tool.
  license:
    name: EUPL-1.2
    url: https://eupl.eu/1.2/en/
  version: 1.3.6
externalDocs:
  description: GitHub
  url: https://github.com/taranis-ai/taranis-ai/
servers:
  - url: /api
    description: default
tags:
  - name: auth
    description: session-related functionality
  - name: health
    description: see whether Taranis dependencies are healthy
  - name: isalive
    description: see whether the Taranis instance is alive
  - name: users
    description: read/update the profile, get wordlists, product types and publisher presets
  - name: analyze
    description: read/update report items, their types, groups and attributes
  - name: assess
    description: read/update/delete OSINT sources and news items
  - name: assets
    description: read/update/delete asset groups, notification templates and attributes
  - name: bots
    description: read/update/delete bots-related information
  - name: collectors
    description: read/update/delete collectors (OSINT sources)
  - name: config
    description: read/update/delete everything config-related
  - name: dashboard
    description: get dashboard data
  - name: presenters
    description: get all presenters nodes
  - name: publish
    description: read/update/delete/publish products
  - name: publishers
    description: read/update/delete publisher nodes/presets
security:
  - APIKey: []
  - UserAuth: []

paths:
  /auth/login:
    post:
      tags:
        - auth
      operationId: auth.login.post
      description: authenticate with either username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/req.auth.username_password"
      responses:
        "200":
          description: successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/resp.auth.JWT"
        "400":
          description: resource not found
        "401":
          description: authentication error (username + password)
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error

  /auth/refresh:
    get:
      tags:
        - auth
      operationId: auth.refresh.get
      description: refresh an API token
      responses:
        "200":
          description: refreshed API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/resp.auth.JWT"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error

  /auth/logout:
    delete:
      tags:
        - auth
      operationId: auth.logout.delete
      description: invalidate API token (i.e. logout)
      parameters:
        - name: jwt
          in: query
          required: false
          schema:
            type: string
        - name: gotoUrl
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: successfully logged-out
        "302":
          description: redirection to the specified URL
        "400":
          description: invalid goto url
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error

  /isalive:
    get:
      tags:
        - isalive
      operationId: isalive.get
      description: see whether the Taranis instance is alive
      security: []
      responses:
        "200":
          description: server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  isalive:
                    type: boolean
                    examples: [True]
  /health:
    get:
      tags:
        - health
      operationId: health.get
      description: see whether the Taranis instance dependencies are healthy
      security: []
      responses:
        "200":
          description: all required services are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: boolean
                    examples: [True]
                  services:
                    type: object
                    properties:
                      database:
                        type: string
                        enum: [up, down, n/a]
                      broker:
                        type: string
                        enum: [up, down, n/a]
                      workers:
                        type: string
                        enum: [up, down, n/a]
        "503":
          description: one or more required services are unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: boolean
                    examples: [False]
                  services:
                    type: object
                    properties:
                      database:
                        type: string
                        enum: [up, down, n/a]
                      broker:
                        type: string
                        enum: [up, down, n/a]
                      workers:
                        type: string
                        enum: [up, down, n/a]
  /users:
    get:
      security:
        - UserAuth: []
      operationId: user.user_info.get
      tags: [users]
      description: get the users details
      responses:
        "200":
          description: the user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user_response_detail"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error

  /users/profile:
    get:
      security:
        - UserAuth: []
      operationId: user.user_profile.get
      tags: [users]
      description: get the user's profile
      responses:
        "200":
          description: the user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user_profile"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error
    put:
      security:
        - UserAuth: []
      operationId: user.user_profile.put
      tags: [users]
      description: update the user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user_profile"
      responses:
        "200":
          description: the updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user_profile"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          description: Internal server error

    post:
      security:
        - UserAuth: []
      tags: [users]
      description: handle profile
      operationId: user.user_profile.post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: forbidden
        "404":
          $ref: "#/components/responses/404NotFound"
  /analyze/report-types:
    get:
      security:
        - UserAuth: []
      tags: [analyze]
      description: get the types of report items
      operationId: analyze.report_types.get
      responses:
        "200":
          description: the types of report items
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/report_item_type"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
  /analyze/report-items:
    get:
      security:
        - UserAuth: []
      tags: [analyze]
      description: get the report items
      operationId: analyze.report_items.get
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: completed
          in: query
          schema:
            type: string
        - name: range
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: group
          in: query
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            format: int32
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: the report items
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/report_item"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      security:
        - UserAuth: []
      tags: [analyze]
      description: add report item
      operationId: analyze.report_items.post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/report_item"
      responses:
        "200":
          description: the ID of the newly created report item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item_response"
        "400":
          description: invalid input data
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

    put:
      security:
        - UserAuth: []
      tags: [analyze]
      description: update report items
      operationId: analyze.report_items.put
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: forbidden
        "404":
          $ref: "#/components/responses/404NotFound"

    delete:
      security:
        - UserAuth: []
      tags: [analyze]
      description: delete report items
      operationId: analyze.report_items.delete
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: forbidden
        "404":
          $ref: "#/components/responses/404NotFound"
  /analyze/report-items/{report_item_id}:
    parameters:
      - name: report_item_id
        in: path
        required: true
        schema:
          type: string
    get:
      security:
        - UserAuth: []
      tags: [analyze]
      description: get a specific report item
      operationId: analyze.report_item.get
      responses:
        "200":
          description: the report item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      security:
        - UserAuth: []
      tags: [analyze]
      description: modify a specific report item
      operationId: analyze.report_item.put
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modify_item"
      responses:
        "200":
          description: the updated report item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item_response"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    delete:
      security:
        - UserAuth: []
      tags: [analyze]
      description: delete a specific report item
      operationId: analyze.report_item.delete
      responses:
        "200":
          description: the report item was deleted
          content:
            application/json:
              schema:
                type: string
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

  /analyze/report-items/{report_item_id}/locks:
    parameters:
      - name: report_item_id
        in: path
        required: true
        schema:
          type: string
    get:
      security:
        - UserAuth: []
      tags: [analyze]
      operationId: analyze.report_item_locks.get
      description: get a report item's field locks
      responses:
        "200":
          description: the report item's field locks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item_lock"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
  /analyze/report-items/{report_item_id}/lock:
    parameters:
      - name: report_item_id
        in: path
        required: true
        schema:
          type: string
    put:
      security:
        - UserAuth: []
      tags: [analyze]
      description: lock the specified field
      operationId: analyze.report_item_lock.put
      responses:
        "200":
          description: the locked field as a SSE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item_lock"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    delete:
      security:
        - UserAuth: []
      tags: [analyze]
      description: unlock the specified field
      operationId: analyze.report_item_lock.delete
      responses:
        "200":
          description: the locked field as a SSE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item_lock"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

  /analyze/report-items/{report_item_id}/clone:
    parameters:
      - name: report_item_id
        in: path
        required: true
        schema:
          type: string
    post:
      security:
        - UserAuth: []
      tags: [analyze]
      description: clone the specified report item
      operationId: analyze.clone_report_item.post
      responses:
        "200":
          description: the cloned report item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/report_item"
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

  /assess/osint-source-group-list:
    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get all the user's OSINT source groups
      operationId: assess.osint_source_groups-list.get
      responses:
        "200":
          description: all the user's OSINT source groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/osint_source_group"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
  /assess/osint-sources-list:
    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get manual OSINT sources
      operationId: assess.osint_sources_list.get
      responses:
        "200":
          description: all manual OSINT sources
          content:
            application/json:
              schema:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/osint_source"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
  /assess/news-items:
    post:
      security:
        - UserAuth: []
      tags: [assess]
      description: add news item
      operationId: assess.news_items.post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/news_item_create"
      responses:
        "200":
          description: the Story IDs and NewsItem IDs of the created news item
          content:
            application/json:
              schema:
                type: object
        "400":
          description: invalid news item data
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
        "409":
          description: news item already exists
        "422":
          description: Unprocessable Entity
        "500":
          description: Adding news item failed

    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get news items
      operationId: assess.news_items.get
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: forbidden
        "404":
          $ref: "#/components/responses/404NotFound"
  /assess/stories:
    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get stories by filters
      operationId: assess.stories.get
      parameters:
        - name: search
          in: query
          description: Filter search string
          schema:
            type: string
        - name: source
          in: query
          description: Filter based on OSINT source
          schema:
            type: string
        - name: group
          in: query
          description: Filter based on OSINT source group
          schema:
            type: string
        - name: read
          in: query
          description: Filter for news_items that are read
          schema:
            type: boolean
        - name: important
          in: query
          description: Filter only important news
          schema:
            type: boolean
        - name: relevant
          in: query
          description: Filter stories by derived relevance score
          schema:
            type: boolean
        - name: in_report
          description: Filter news-items that are added to reports
          in: query
          schema:
            type: boolean
        - name: range
          description: Filter news-items with a time-range(DAY, WEEK, MONTH)
          in: query
          schema:
            type: string
        - name: sort
          description: Sort the results(DATE_DESC, DATE_ASC, RELEVANCE)
          in: query
          schema:
            type: string
        - name: offset
          in: query
          description: Offset for the results.
          schema:
            type: integer
            minimum: 0
            format: int32
        - name: limit
          description: Limit results to a specific number.
          in: query
          schema:
            type: integer
            minimum: 1
            format: int32
      responses:
        "200":
          description: the news items of the specified group
          content:
            application/json:
              schema:
                type: object
                properties:
                  counts:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      read_count:
                        type: integer
                      important_count:
                        type: integer
                      in_report_count:
                        type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/story"
        "400":
          description: erroneous input data
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

    post:
      security:
        - UserAuth: []
      tags: [assess]
      description: handle stories
      operationId: assess.stories.post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
        "400":
          description: invalid request
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          description: forbidden
        "404":
          $ref: "#/components/responses/404NotFound"
  /assess/news-items/{item_id}:
    parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: string
    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get the specified news item
      operationId: assess.news_item.get
      responses:
        "200":
          description: the news item
          content:
            application/json:
              schema:
                type: object

        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      security:
        - UserAuth: []
      tags: [assess]
      description: modify the specified news item
      operationId: assess.news_item.put
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/news_item_update"
      responses:
        "200":
          description: the news item was modified
          content:
            application/json:
              schema:
                type: object
        "400":
          description: erroneous input data
        "409":
          description: news item already exists
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    patch:
      security:
        - UserAuth: []
      tags: [assess]
      description: partially modify the specified news item
      operationId: assess.news_item.patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/news_item_update"
      responses:
        "200":
          description: the news item was modified
          content:
            application/json:
              schema:
                type: object
        "400":
          description: erroneous input data
        "409":
          description: news item already exists
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    delete:
      security:
        - UserAuth: []
      tags: [assess]
      description: delete the specified news item
      operationId: assess.news_item.delete
      responses:
        "200":
          description: the news item was deleted
          content:
            application/json:
              schema:
                type: object
        "400":
          description: cant delete news item
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "500":
          description: story in use
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/404NotFound"

  /assess/story/{story_id}:
    parameters:
      - name: story_id
        in: path
        required: true
        schema:
          type: string
    get:
      security:
        - UserAuth: []
      tags: [assess]
      description: get the specified story
      operationId: assess.story.get
      responses:
        "200":
          description: the story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/story"
        "400":
          description: invalid story_id
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      security:
        - UserAuth: []
      tags: [assess]
      description: modify the specified story
      operationId: assess.story.put
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                read:
                  type: boolean
                important:
                  type: boolean
                vote:
                  type: boolean
                title:
                  type: string
                description:
                  type: string
                comments:
                  type: string
      responses:
        "200":
          description: message if modification was successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modify_item"
        "400":
          description: invalid story_id

        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"
    delete:
      security:
        - UserAuth: []
      tags: [assess]
      description: delete the specified story
      operationId: assess.story.delete
      responses:
        "200":
          description: the story was deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modify_item"
        "400":
          description: invalid story_id

        "401":
          $ref: "#/components/responses/401Unauthorized"
        "500":
          description: story in use
          content:
            application/json:
              schema:
                type: string
