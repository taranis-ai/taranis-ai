        status:
          type: [string, "null"]
        last_run:
          type: [string, "null"]
          format: date-time
        last_success:
          type: [string, "null"]
          format: date-time
      required:
        - id

    task_history_stats:
      type: object
      properties:
        last_run:
          type: [string, "null"]
        last_success:
          type: [string, "null"]
        last_run_display:
          type: [string, "null"]
        last_success_display:
          type: [string, "null"]
        successes:
          type: integer
        failures:
          type: integer
        total:
          type: integer
        success_pct:
          type: integer
        status_badge:
          type: [object, "null"]
          additionalProperties:
            type: string
      required:
        - successes
        - failures
        - total
        - success_pct

    task_history_totals:
      type: object
      properties:
        successes:
          type: integer
        failures:
          type: integer
        overall_success_rate:
          type: integer
      required:
        - successes
        - failures
        - overall_success_rate

    task_history_response:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/task_history_entry"
        total_count:
          type: integer
        task_stats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/task_history_stats"
        totals:
          $ref: "#/components/schemas/task_history_totals"
      required:
        - items
        - total_count
        - task_stats
        - totals

  securitySchemes:
    APIKey:
      type: http
      scheme: bearer
      bearerFormat: APIKEY
    UserAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    404NotFound:
      description: "Not found response"
    401Unauthorized:
      description: authorization error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    405MethodNotAllowed:
      description: method not allowed
