          type: string
          minLength: 1
          description: accepted input alias for id
        task:
          type: [string, "null"]
        status:
          type: string
          minLength: 1
        result:
          description: JSON-serializable task payload
      required:
        - status
      anyOf:
        - required: [id]
        - required: [task_id]

