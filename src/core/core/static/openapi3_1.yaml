      type: object
      properties:
        id:
          type: string
        task:
          type: [string, "null"]
        result:
          description: JSON payload stored as provided by the worker
        status:
          type: [string, "null"]
        last_run:
          type: [string, "null"]
          format: date-time
        last_success:
          type: [string, "null"]
          format: date-time
      required:
        - id

