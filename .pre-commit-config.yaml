exclude: ^src/frontend/frontend/static/.*$

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        files: ^(src/core|src/worker|src/frontend|src/models)
        exclude: ^src/core/migrations/
        args: [--fix, --select, I]
      - id: ruff-format
        files: ^(src/core|src/worker|src/frontend|src/models)
        exclude: ^src/core/migrations/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: djlint-reformat-jinja
        name: djlint
        language: system
        files: ^src/frontend/frontend/templates
        entry: >-
          bash -c 'files=(); for file in "$@"; do files+=("${file#src/frontend/}"); done;
          cd src/frontend && uv run --frozen --all-extras djlint --profile=jinja --reformat "${files[@]}"' --
        types_or: [jinja, html]
