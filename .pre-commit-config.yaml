exclude: ^src/frontend/frontend/static/.*$

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        files: ^(src/core|src/worker|src/frontend|src/models)
        exclude: ^src/core/migrations/
        args: [--fix, --select, I]
      - id: ruff-format
        files: ^(src/core|src/worker|src/frontend|src/models)
        exclude: ^src/core/migrations/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: djlint-reformat-jinja
        name: djlint
        language: system
        files: ^src/frontend/frontend/templates
        pass_filenames: false
        entry: uv run --directory src/frontend --frozen --all-extras djlint --profile=jinja --reformat frontend/templates
        types_or: [jinja, html]
      - id: pyrefly-changed-python
        name: pyrefly changed python
        language: system
        files: ^src/(core|frontend|models|worker)/.*\.py$
        pass_filenames: false
        entry: dev/check_pyrefly.sh --staged
        types: [python]
