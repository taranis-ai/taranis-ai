name: test and lint

on:
  workflow_dispatch:
  pull_request:

env:
  UV_NO_SYNC: true
  UV_FROZEN: true

jobs:
  detect_signoff:
    name: detect signoff
    runs-on: ubuntu-latest
    permissions:
      statuses: read
    outputs:
      signedoff: ${{ steps.detect.outputs.signedoff }}
    steps:
      - name: Check signoff status
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const headRepo = context.payload.pull_request?.head?.repo?.full_name || process.env.GITHUB_REPOSITORY;
            const [owner, repo] = headRepo.split("/");
            const ref = context.payload.pull_request?.head?.sha || context.sha;
            let signedoff = false;

            try {
              const statuses = await github.paginate(
                github.rest.repos.listCommitStatusesForRef,
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                }
              );
              const signoff = statuses.find((status) => status.context === "signoff");

              if (signoff?.state === "success") {
                signedoff = true;
              }

              core.info(
                `Checked signoff status for ${headRepo}@${ref}: ${signoff?.state || "missing"}`
              );
            } catch (error) {
              core.warning(`Failed to read signoff status for ${headRepo}@${ref}: ${error.message}`);
            }

            core.setOutput("signedoff", signedoff ? "true" : "false");

  test_core:
    name: pytest core
    needs: detect_signoff
    if: needs.detect_signoff.outputs.signedoff != 'true'
    defaults:
      run:
        working-directory: src/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: Run tests and capture output
        id: run-tests
        run: |
          set -o pipefail
          uv run pytest | tee pytest_output.txt
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **✅ Passed:** $(grep -oP '\d+(?= passed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **❌ Failed:** $(grep -oP '\d+(?= failed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **⚠️ Skipped:** $(grep -oP '\d+(?= skipped)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **🚨 Errors:** $(grep -oP '\d+(?= error)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY

  test_frontend:
    name: pytest frontend
    needs: detect_signoff
    if: needs.detect_signoff.outputs.signedoff != 'true'
    defaults:
      run:
        working-directory: src/frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: DJLint templates
        run: uv run djlint --profile=jinja --check frontend/templates

      - name: Run tests and capture output
        id: run-tests
        run: |
          set -o pipefail
          uv run pytest | tee pytest_output.txt
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **✅ Passed:** $(grep -oP '\d+(?= passed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **❌ Failed:** $(grep -oP '\d+(?= failed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **⚠️ Skipped:** $(grep -oP '\d+(?= skipped)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **🚨 Errors:** $(grep -oP '\d+(?= error)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY

  e2e_tests:
    name: End-to-End Tests
    if: needs.detect_signoff.outputs.signedoff != 'true'
    runs-on: ubuntu-latest
    needs: [detect_signoff, test_core, test_frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set PLAYWRIGHT_BROWSERS_PATH and TRACES_ARTIFACT_NAME
        run: |
          echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> $GITHUB_ENV
          TRACES_ARTIFACT_NAME="playwright-traces-${{ github.event.pull_request.number || github.run_number }}"
          echo "TRACES_ARTIFACT_NAME=${TRACES_ARTIFACT_NAME//\//-}" >> $GITHUB_ENV

      - name: Check Playwright version consistency in uv.lock files
        run: |
          set -euo pipefail

          FRONTEND_PLAYWRIGHT_VERSION=$(uv export --frozen --no-hashes --all-extras --directory src/frontend | grep '^playwright==' | cut -d= -f3)
          CORE_PLAYWRIGHT_VERSION=$(uv export --frozen --no-hashes --all-extras --directory src/core | grep '^playwright==' | cut -d= -f3)

          echo "Frontend playwright version: $FRONTEND_PLAYWRIGHT_VERSION"
          echo "Core playwright version:     $CORE_PLAYWRIGHT_VERSION"

          if [ "$FRONTEND_PLAYWRIGHT_VERSION" != "$CORE_PLAYWRIGHT_VERSION" ]; then
            echo "::error ::Mismatch in declared playwright versions!"
            echo "::error ::src/frontend declares $FRONTEND_PLAYWRIGHT_VERSION, but src/core declares $CORE_PLAYWRIGHT_VERSION."
            echo "::error ::Please run \`uv sync --upgrade --all-extras\` in both folders to align."
            exit 1
          fi

          echo "PLAYWRIGHT_VERSION=$FRONTEND_PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"


      - name: Install core dependencies
        working-directory: src/core
        run: uv sync --all-extras

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: uv sync --all-extras

      - name: Install worker dependencies
        working-directory: src/worker
        run: uv sync --all-extras

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: src/frontend
        run: uv run playwright install --with-deps --only-shell chromium

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Build Tailwind CSS
        working-directory: src/frontend
        run: ./build_tailwindcss.sh

      - name: Run e2e tests
        id: run_e2e
        working-directory: src/frontend
        run: uv run pytest --e2e-ci

      - name: Upload a e2e-test trace
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.run_e2e.outcome == 'failure' }}
        with:
          retention-days: 7
          overwrite: true
          name: ${{ env.TRACES_ARTIFACT_NAME }}
          path: src/**/taranis_ai_*_trace.zip

  test_worker:
    name: pytest worker
    needs: detect_signoff
    if: needs.detect_signoff.outputs.signedoff != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/worker
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install worker
        run: uv sync --all-extras

      - name: Install playwright dependencies
        run: uv run playwright install --with-deps --only-shell chromium

      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: Run tests and capture output
        id: run-tests
        run: |
          set -o pipefail
          uv run pytest | tee pytest_output.txt
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **✅ Passed:** $(grep -oP '\d+(?= passed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **❌ Failed:** $(grep -oP '\d+(?= failed)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **⚠️ Skipped:** $(grep -oP '\d+(?= skipped)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- **🚨 Errors:** $(grep -oP '\d+(?= error)' pytest_output.txt || echo 0)" >> $GITHUB_STEP_SUMMARY

  local_or_ci:
    name: local or ci
    if: always()
    runs-on: ubuntu-latest
    needs:
      - detect_signoff
      - test_core
      - test_frontend
      - e2e_tests
      - test_worker
    permissions:
      statuses: read
    steps:
      - name: Evaluate signoff or CI result
        env:
          SIGNEDOFF: ${{ needs.detect_signoff.outputs.signedoff }}
          TEST_CORE_RESULT: ${{ needs.test_core.result }}
          TEST_FRONTEND_RESULT: ${{ needs.test_frontend.result }}
          E2E_RESULT: ${{ needs.e2e_tests.result }}
          TEST_WORKER_RESULT: ${{ needs.test_worker.result }}
        run: |
          if [ "$SIGNEDOFF" = "true" ]; then
            echo "Current head commit is signed off."
            exit 0
          fi

          if [ "$TEST_CORE_RESULT" = "success" ] \
            && [ "$TEST_FRONTEND_RESULT" = "success" ] \
            && [ "$E2E_RESULT" = "success" ] \
            && [ "$TEST_WORKER_RESULT" = "success" ]; then
            echo "All CI jobs passed."
            exit 0
          fi

          echo "::error ::Neither a valid local signoff nor a full successful CI run is present."
          exit 1
