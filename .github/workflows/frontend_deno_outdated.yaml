name: frontend deno outdated

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  outdated:
    name: check frontend deno dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Check for outdated Deno dependencies
        id: outdated
        run: |
          set -euo pipefail

          deno outdated -q > outdated.txt

          if [ -s outdated.txt ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow summary
        if: always()
        env:
          HAS_UPDATES: ${{ steps.outdated.outputs.has_updates }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          checked_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "## Frontend Deno outdated check"
            echo
            echo "- Path: \`src/frontend\`"
            echo "- Checked at (UTC): \`$checked_at\`"
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Run: $RUN_URL"
            echo

            if [ -f outdated.txt ] && [ -s outdated.txt ]; then
              echo "Outdated dependencies were found."
              echo
              echo '```text'
              cat outdated.txt
              echo '```'
            elif [ "${HAS_UPDATES:-}" = "false" ]; then
              echo "No outdated dependencies found."
            else
              echo "The outdated check did not produce a report. Inspect the job logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

