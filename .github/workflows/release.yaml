name: Release on pushed tags

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get tag name
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Update env.sample
        run: |
          cp docker/env.sample ${{ runner.temp }}
          sed -i 's/^TARANIS_TAG=.*/TARANIS_TAG=${{ env.TAG }}/' ${{ runner.temp }}/env.sample

      - name: Get Tag Message
        run: |
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*
          echo "### ${{ env.TAG }}" >> $GITHUB_STEP_SUMMARY
          git tag -l --format='%(contents)' ${{ env.TAG }} >> $GITHUB_STEP_SUMMARY
          git tag -l --format='%(contents)' ${{ env.TAG }} >> ${{ runner.temp }}/release_body.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild images with version layer
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TAG: ${{ env.TAG }}
        run: |
          images=("taranis-core" "taranis-worker" "taranis-ingress" "taranis-frontend")
          short_sha=$(printf '%.7s' "${GITHUB_SHA}")
          git_info=$(printf '{"branch":"master","HEAD":"%s","tag":"%s"}' "${short_sha}" "${TAG}")

          for image in "${images[@]}"; do
            printf 'FROM ghcr.io/%s/%s:latest\nENV GIT_INFO=%s\n' \
              "${REPOSITORY_OWNER}" "${image}" "${git_info}" \
            | docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "ghcr.io/${REPOSITORY_OWNER}/${image}:${TAG}" \
              --tag "ghcr.io/${REPOSITORY_OWNER}/${image}:stable" \
              --metadata-file "${{ runner.temp }}/${image}-meta.json" \
              --push \
              -
          done

      - name: Attest images
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TAG: ${{ env.TAG }}
        run: |
          images=("taranis-core" "taranis-worker" "taranis-ingress" "taranis-frontend")
          for image in "${images[@]}"; do
            digest=$(jq -r '."containerimage.digest"' "${{ runner.temp }}/${image}-meta.json")
            echo "DIGEST_${image//-/_}=$digest" >> $GITHUB_ENV
          done

      - name: Attest taranis-core
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taranis-core
          subject-digest: ${{ env.DIGEST_taranis_core }}
          push-to-registry: true

      - name: Attest taranis-worker
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taranis-worker
          subject-digest: ${{ env.DIGEST_taranis_worker }}
          push-to-registry: true

      - name: Attest taranis-ingress
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taranis-ingress
          subject-digest: ${{ env.DIGEST_taranis_ingress }}
          push-to-registry: true

      - name: Attest taranis-frontend
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taranis-frontend
          subject-digest: ${{ env.DIGEST_taranis_frontend }}
          push-to-registry: true

      - name: Download latest SBOM artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list --workflow "build core" --status success --commit "${{ github.sha }}" --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run download $run_id -n taranis_core_sbom.json -D ${{ runner.temp }}

      - name: Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          append_body: true
          body_path: ${{ runner.temp }}/release_body.md
          files: |
            docker/compose.yml
            ${{ runner.temp }}/env.sample
            ${{ runner.temp }}/taranis_core_sbom.json
