name: Smoke test docker compose
on:
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

jobs:
  test_docker_deployment:
    if: ${{ github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker images from PR code
        run: |
          chmod +x docker/build_container.sh
          ./docker/build_container.sh

      - name: Start docker compose for last commit
        working-directory: docker
        env:
          DEBUG: "false"
          WORKER_TYPES: '["Presenters","Publishers"]'
        run: |
          cp env.sample .env
          docker compose pull rabbitmq sse database
          docker compose up ingress core frontend database collector workers sse rabbitmq --pull=never --wait-timeout=60 --wait
          echo "Echo docker ps -a:"
          docker ps -a

      - name: Echo core logs
        if: ${{ failure() }}
        working-directory: docker
        env:
          DEBUG: "false"
        run: docker compose logs core

      - name: Stop docker compose
        if: ${{ always() }}
        working-directory: docker
        env:
          DEBUG: "false"
        run: docker compose down
