name: Smoke test docker compose
on:
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  test_docker_deployment:
    if: ${{ github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker images from PR code
        run: |
          chmod +x docker/build_container.sh
          ./docker/build_container.sh

      - name: Run docker compose for last commit
        working-directory: docker
        env:
          PRE_SEED_PASSWORD_USER: test
        run: |
          cp env.sample .env
          docker compose pull redis sse database
          docker compose up ingress core frontend database redis collector workers cron sse --pull=never --wait-timeout=180 --wait

      - name: Check container status
        # Show status/logs only when a previous step failed (e.g. compose --wait)
        if: failure()
        working-directory: docker
        run: |
          echo "Container status:"
          docker compose ps
          echo ""
          echo "Container logs:"
          docker compose logs

      - name: Verify all containers are healthy
        # we could drop this step and rely on `--wait` above, but this gives more detailed output
        if: success()
        working-directory: docker
        run: |
          # Check that services with healthchecks are healthy
          for service in core frontend collector workers cron database redis; do
            HEALTH=$(docker compose ps $service --format json | jq -r '.Health')
            if [ -n "$HEALTH" ] && [ "$HEALTH" != "healthy" ]; then
              echo "❌ Service $service health check failed (health: $HEALTH)"
              docker compose ps
              docker compose logs $service
              exit 1
            fi
          done

          echo "✅ All containers are healthy and running"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install frontend e2e dependencies
        working-directory: src/frontend
        run: uv sync --all-extras --dev --frozen

      - name: Install Playwright dependencies
        working-directory: src/frontend
        run: uv run playwright install --with-deps chromium

      - name: Run frontend e2e tests against production compose stack
        working-directory: src/frontend
        env:
          DEBUG: "false"
          TARANIS_E2E_EXTERNAL_BASE_URL: "http://127.0.0.1:8080/frontend"
          TARANIS_E2E_EXTERNAL_CORE_API_URL: "http://127.0.0.1:8080/api"
          TARANIS_E2E_EXTERNAL_API_KEY: "supersecret"
          TARANIS_E2E_EXTERNAL_AUTH_USERNAME: "admin"
          TARANIS_E2E_EXTERNAL_AUTH_PASSWORD: "admin"
          TARANIS_E2E_EXTERNAL_BASIC_AUTH_USERNAME: "user"
          TARANIS_E2E_EXTERNAL_BASIC_AUTH_PASSWORD: "test"
        run: |
          uv run pytest \
            tests/playwright/test_e2e_admin.py \
            tests/playwright/test_e2e_user.py \
            --e2e-ci \
            -ra

      - name: Show compose logs after e2e failure
        if: failure()
        working-directory: docker
        run: |
          echo "Container status:"
          docker compose ps
          echo ""
          echo "Container logs:"
          docker compose logs

      - name: Cleanup
        if: always()
        working-directory: docker
        run: docker compose down
