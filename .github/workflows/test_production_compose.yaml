name: Smoke test docker compose
on:
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

jobs:
  test_docker_deployment:
    if: ${{ github.event.review.state == 'approved' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images from PR code
        run: |
          chmod +x docker/build_container.sh
          ./docker/build_container.sh

      - name: Start docker compose for last commit
        working-directory: docker
        env:
          DEBUG: "false"
        run: |
          cp env.sample .env
          docker compose pull rabbitmq sse database
          docker compose up ingress core frontend database workers sse rabbitmq --pull=never --wait-timeout=60 --wait
          echo "Echo docker ps -a:"
          docker ps -a

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install frontend e2e dependencies
        working-directory: src/frontend
        run: uv sync --all-extras --frozen

      - name: Install Playwright dependencies
        working-directory: src/frontend
        run: uv run playwright install --with-deps --only-shell chromium

      - name: Run frontend e2e tests against external smoke stack
        working-directory: src/frontend
        env:
          DEBUG: "false"
          TARANIS_E2E_EXTERNAL_BASE_URL: "http://127.0.0.1:8080/frontend"
          TARANIS_E2E_EXTERNAL_CORE_URL: "http://127.0.0.1:8080/api"
          TARANIS_E2E_EXTERNAL_API_KEY: "supersecret"
          TARANIS_E2E_EXTERNAL_AUTH_USERNAME: "admin"
          TARANIS_E2E_EXTERNAL_AUTH_PASSWORD: "admin"
        run: uv run pytest --e2e-ci

      - name: Echo core logs
        if: ${{ failure() }}
        working-directory: docker
        env:
          DEBUG: "false"
        run: docker compose logs core

      - name: Stop docker compose
        if: ${{ always() }}
        working-directory: docker
        env:
          DEBUG: "false"
        run: |
          docker compose down
