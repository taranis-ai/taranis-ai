spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sse-broker
  template:
    metadata:
      labels:
        app: sse-broker
    spec:
      containers:
        - name: sse-broker
          image: ghcr.io/taranis-ai/sse-broker:latest
          imagePullPolicy: Always
          env:
