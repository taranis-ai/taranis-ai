apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
        taranis.io/expose: "true"
    spec:
      containers:
        - name: core
          image: ghcr.io/taranis-ai/taranis-core:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: taranis-config
            - secretRef:
                name: db-credentials
            - secretRef:
                name: taranis-rabbitmq-credentials
          env:
            - name: APPLICATION_ROOT
              valueFrom:
                configMapKeyRef:
                  name: taranis-config
                  key: TARANIS_BASE_PATH
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: JWT_SECRET_KEY
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: API_KEY
            - name: PRE_SEED_PASSWORD_ADMIN
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: PRE_SEED_PASSWORD_ADMIN
            - name: PRE_SEED_PASSWORD_USER
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: PRE_SEED_PASSWORD_USER
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            exec:
              command:
                - taranis-core-healthcheck
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - taranis-core-healthcheck
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: core
              mountPath: /app/data
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: core
          persistentVolumeClaim:
            claimName: core
---
