apiVersion: v1
kind: ConfigMap
metadata:
  name: taranis-config
data:
  DEBUG: "false"
  GRANIAN_HOST: CHANGE_ME_BIND_HOST
  GRANIAN_PORT: "8080"
  TARANIS_BASE_PATH: /
  SSE_PATH: /sse
  TARANIS_PORT: "8080"
  REQUESTS_TIMEOUT: "600"
  SQLALCHEMY_POOL_TIMEOUT: "3600"
  SQLALCHEMY_POOL_RECYCLE: "3600"
  TARANIS_AUTHENTICATOR: database
  SUMMARY_API_ENDPOINT: http://llm-bot:5500/summarize
  NLP_API_ENDPOINT: http://llm-bot:5500/ner
  STORY_API_ENDPOINT: http://llm-bot:5500/cluster
  LLM_BASE_URL: CHANGE_ME_LLM_BASE_URL
  LLM_MODEL: CHANGE_ME_LLM_MODEL
  LLM_TIMEOUT: "120"
  CACHE_DEFAULT_TIMEOUT: "1"
