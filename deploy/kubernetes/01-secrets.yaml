apiVersion: v1
kind: Secret
metadata:
  name: taranis-secrets
type: Opaque
stringData:
  JWT_SECRET_KEY: CHANGE_ME_LONG_RANDOM_JWT_SECRET
  API_KEY: CHANGE_ME_CORE_API_KEY
  BOT_API_KEY: CHANGE_ME_BOT_API_KEY
  LLM_API_KEY: CHANGE_ME_LLM_API_KEY
  PRE_SEED_PASSWORD_ADMIN: CHANGE_ME_ADMIN_PASSWORD
  PRE_SEED_PASSWORD_USER: CHANGE_ME_DEFAULT_USER_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  DB_URL: CHANGE_ME_DATABASE_HOSTNAME
  DB_DATABASE: CHANGE_ME_DATABASE_NAME
  DB_USER: CHANGE_ME_DATABASE_USER
  DB_PASSWORD: CHANGE_ME_DATABASE_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: taranis-redis-credentials
type: Opaque
stringData:
  REDIS_URL: redis://CHANGE_ME_REDIS_HOSTNAME:6379/0
  REDIS_PASSWORD: CHANGE_ME_REDIS_PASSWORD
