apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
  labels:
    {{- include "taranis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.ingress }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
        taranis.io/expose: "true"
    spec:
      containers:
        - name: ingress
          image: {{ include "taranis.image" .Values.images.ingress | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: NGINX_WORKERS
              value: "4"
            - name: NGINX_CONNECTIONS
              value: "16"
            - name: TARANIS_CORE_UPSTREAM
              value: core:8080
            - name: TARANIS_SSE_UPSTREAM
              value: sse:8088
            - name: TARANIS_FRONTEND_UPSTREAM
              value: frontend:8080
            - name: TARANIS_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: taranis-config
                  key: TARANIS_BASE_PATH
          ports:
            - containerPort: 8080
              name: http
          resources:
            {{- toYaml .Values.resources.ingress | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  labels:
    {{- include "taranis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.collector }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
        - name: collector
          image: {{ include "taranis.image" .Values.images.worker | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: taranis-config
            - secretRef:
                name: taranis-rabbitmq-credentials
          env:
            - name: TARANIS_CORE_URL
              value: http://core:8080/api
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: API_KEY
            - name: WORKER_TYPES
              value: '["Collectors"]'
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPES='[]' celery --app worker status | grep "$(hostname)" | grep -q 'OK'
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPES='[]' celery --app worker status | grep "$(hostname)" | grep -q 'OK'
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.resources.collector | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    {{- include "taranis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.worker }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: {{ include "taranis.image" .Values.images.worker | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: taranis-config
            - secretRef:
                name: taranis-secrets
            - secretRef:
                name: taranis-rabbitmq-credentials
          env:
            - name: TARANIS_CORE_URL
              value: http://core:8080/api
            - name: WORKER_TYPES
              value: '["Presenters", "Publishers", "Bots", "Connectors"]'
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPES='[]' celery --app worker status | grep "$(hostname)" | grep -q 'OK'
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - WORKER_TYPES='[]' celery --app worker status | grep "$(hostname)" | grep -q 'OK'
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-bot
  labels:
    {{- include "taranis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.nlp }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nlp-bot
  template:
    metadata:
      labels:
        app: nlp-bot
    spec:
      containers:
        - name: nlp-bot
          image: {{ include "taranis.image" .Values.images.nlp | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: taranis-config
                  key: DEBUG
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: taranis-secrets
                  key: BOT_API_KEY
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: GRANIAN_BLOCKING_THREADS
              value: "1"
            - name: GRANIAN_INTERFACE
              value: "asgi"
            - name: GRANIAN_WORKERS
              value: "2"
            - name: GRANIAN_WORKERS_MAX_RSS
              value: "5500"
            - name: HF_HOME
              value: /app/.cache/huggingface
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.nlp | nindent 12 }}
---
